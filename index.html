      .timeline::after {
        content: "";
        position: absolute;
        width: 6px;
        background-color: #10b981;
        top: 0;
        bottom: 0;
        left: 50%;
        margin-left: -3px;
      }
      .timeline-container {
        padding: 10px 40px;
        position: relative;
        background-color: inherit;
        width: 50%;
      }
      .timeline-container.left {
        left: 0;
      }
      .timeline-container.right {
        left: 50%;
      }
      .timeline-container::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        right: -10px;
        background-color: white;
        border: 3px solid #10b981;
        top: 15px;
        border-radius: 50%;
        z-index: 1;
      }
      .right::after {
        left: -10px;
      }
      .timeline-content {
        padding: 20px;
        background-color: white;
